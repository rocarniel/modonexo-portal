<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MODOnexo — Login</title>
  <link rel="stylesheet" href="css/style.css?v=202607021600">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="brand">MODO<span class="accent">nexo</span></div>
        <div class="sub">Portal de Oportunidades Imobiliárias</div>
      </div>

      <div id="alertLogin" class="alert alert-error" style="display:none"></div>

      <form id="formLogin">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="btnLogin">
          Entrar
        </button>
      </form>

      <div class="divider"></div>

      <div class="text-center" style="font-size:13px; color:var(--text-muted)">
        <a href="#" id="linkEsqueci" style="color:var(--navy)">Esqueci minha senha</a>
        &nbsp;·&nbsp;
        <a href="cadastro.html" style="color:var(--gold)">Quero ser parceiro</a>
      </div>
    </div>
  </div>

  <!-- Modal recuperação de senha -->
  <div id="modalSenha" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center">
    <div style="background:#fff;border-radius:16px;padding:36px 32px;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center">
      <div style="font-size:48px;margin-bottom:12px">🔑</div>
      <h2 style="color:#1a1a2e;margin:0 0 8px">Defina sua senha</h2>
      <p style="color:#64748b;font-size:14px;margin-bottom:24px">
        Digite seu e-mail cadastrado e enviaremos um link para você criar sua senha de acesso.
      </p>
      <input type="email" id="emailReset" placeholder="seu@email.com"
        style="width:100%;padding:12px 16px;border:1px solid #e2e8f0;border-radius:8px;font-size:15px;box-sizing:border-box;margin-bottom:16px">
      <div id="alertReset" style="display:none;padding:10px 16px;border-radius:8px;font-size:14px;margin-bottom:16px"></div>
      <button id="btnReset" onclick="enviarReset()"
        style="width:100%;background:#1a1a2e;color:#fff;border:none;padding:13px;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:12px">
        Enviar link de acesso
      </button>
      <button onclick="fecharModalSenha()"
        style="background:none;border:none;color:#94a3b8;font-size:14px;cursor:pointer">
        Cancelar
      </button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js?v=202607021600"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js?v=202607021600"></script>
  <script src="js/config.js?v=202607021600"></script>
  <script src="js/auth.js?v=202607021600"></script>
  <script>
    firebase.initializeApp(CONFIG.firebase);

    // Se já logado, redireciona
    firebase.auth().onAuthStateChanged((user) => {
      if (user) {
        window.location.href = isAdmin(user.email)
          ? "admin/mapa.html"
          : "parceiro/dashboard.html";
      }
    });

    document.getElementById("formLogin").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn   = document.getElementById("btnLogin");
      const alert = document.getElementById("alertLogin");
      alert.style.display = "none";
      btn.disabled = true;
      btn.textContent = "Entrando…";

      try {
        const email = document.getElementById("email").value.trim();
        const senha = document.getElementById("senha").value;
        await login(email, senha);
        // onAuthStateChanged cuida do redirect
      } catch (err) {
        let msg = "E-mail ou senha incorretos.";
        if (err.code === "auth/too-many-requests") msg = "Muitas tentativas. Aguarde alguns minutos.";
        if (err.code === "auth/user-disabled")     msg = "Usuário suspenso. Entre em contato com a MODO.";
        alert.textContent = msg;
        alert.style.display = "flex";
        btn.disabled = false;
        btn.textContent = "Entrar";
      }
    });

    document.getElementById("linkEsqueci").addEventListener("click", (e) => {
      e.preventDefault();
      // Pré-preenche com o e-mail já digitado, se houver
      const emailDigitado = document.getElementById("email").value.trim();
      if (emailDigitado) document.getElementById("emailReset").value = emailDigitado;
      abrirModalSenha();
    });

    function abrirModalSenha() {
      const modal = document.getElementById("modalSenha");
      modal.style.display = "flex";
      setTimeout(() => document.getElementById("emailReset").focus(), 100);
    }

    function fecharModalSenha() {
      document.getElementById("modalSenha").style.display = "none";
      document.getElementById("alertReset").style.display = "none";
      document.getElementById("emailReset").value = "";
    }

    async function enviarReset() {
      const email = document.getElementById("emailReset").value.trim();
      const alerta = document.getElementById("alertReset");
      const btn    = document.getElementById("btnReset");
      if (!email) { alerta.textContent = "Digite seu e-mail."; alerta.className = ""; alerta.style.cssText = "display:block;padding:10px 16px;border-radius:8px;font-size:14px;margin-bottom:16px;background:#fee2e2;color:#dc2626"; return; }
      btn.disabled = true;
      btn.textContent = "Enviando…";
      try {
        await sendPasswordReset(email);
        alerta.textContent = "✅ Link enviado! Verifique sua caixa de entrada.";
        alerta.style.cssText = "display:block;padding:10px 16px;border-radius:8px;font-size:14px;margin-bottom:16px;background:#dcfce7;color:#16a34a";
        btn.textContent = "Enviado!";
        setTimeout(fecharModalSenha, 3000);
      } catch {
        alerta.textContent = "Não foi possível enviar. Verifique o e-mail.";
        alerta.style.cssText = "display:block;padding:10px 16px;border-radius:8px;font-size:14px;margin-bottom:16px;background:#fee2e2;color:#dc2626";
        btn.disabled = false;
        btn.textContent = "Enviar link de acesso";
      }
    }

    // Abre modal automaticamente se vier do email de boas-vindas
    const _params = new URLSearchParams(window.location.search);
    if (_params.get("resetSenha") === "1") {
      const emailParam = _params.get("email");
      if (emailParam) document.getElementById("emailReset").value = decodeURIComponent(emailParam);
      abrirModalSenha();
    }

    // Fecha modal ao clicar fora
    document.getElementById("modalSenha").addEventListener("click", (e) => {
      if (e.target === document.getElementById("modalSenha")) fecharModalSenha();
    });
  </script>
</body>
</html>
