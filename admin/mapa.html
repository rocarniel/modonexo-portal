<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MODOnexo — Mapa</title>
  <link rel="stylesheet" href="../css/style.css?v=202606300001">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    #map { height: calc(100vh - 130px); border-radius: var(--radius); }
    .map-layout { display: flex; gap: 16px; align-items: flex-start; }
    .map-sidebar { width: 280px; flex-shrink: 0; display: flex; flex-direction: column; gap: 12px; max-height: calc(100vh - 130px); overflow-y: auto; }
    .map-container { flex: 1; }
    .filter-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px; }
    .filter-card label { font-size: 12px; font-weight: bold; color: var(--navy); display: block; margin-bottom: 4px; }
    .filter-card select, .filter-card input { width: 100%; padding: 7px 10px; font-size: 13px; border: 1.5px solid var(--border); border-radius: 6px; background: var(--bg); }
    .legenda { display: flex; flex-direction: column; gap: 6px; }
    .legenda-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .popup-title { font-weight: bold; font-size: 14px; color: var(--navy); margin-bottom: 4px; }
    .popup-meta { font-size: 12px; color: #555; line-height: 1.7; }
    .popup-btn { display: block; margin-top: 8px; background: var(--navy); color: #fff; text-align: center; padding: 6px 10px; border-radius: 6px; font-size: 12px; text-decoration: none; }
    .view-toggle { display: flex; gap: 4px; }
    .view-btn { padding: 6px 14px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--white); cursor: pointer; font-size: 13px; font-family: Arial, sans-serif; }
    .view-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }
    @media (max-width: 768px) {
      .map-layout { flex-direction: column; }
      .map-sidebar { width: 100%; max-height: none; }
      #map { height: 55vh; }
    }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebarMount"></div>
  <div class="main-content">
    <div id="mobileHeaderMount"></div>
    <div class="page-header">
      <h1 class="page-title">🗺️ Mapa de Oportunidades</h1>
      <div class="view-toggle">
        <button class="view-btn active" id="btnMapa" onclick="mostrarMapa()">🗺️ Mapa</button>
        <button class="view-btn" id="btnLista" onclick="mostrarLista()">📋 Lista</button>
      </div>
    </div>

    <div class="page-body" style="padding-top:0">
      <!-- KPIs -->
      <div class="kpi-grid" style="margin-bottom:16px" id="kpiArea">
        <div class="kpi-card"><div class="kpi-label">Total</div><div class="kpi-value" id="kpiTotal">—</div></div>
        <div class="kpi-card gold"><div class="kpi-label">Valor médio</div><div class="kpi-value" id="kpiMedio" style="font-size:18px">—</div></div>
        <div class="kpi-card green"><div class="kpi-label">Viáveis</div><div class="kpi-value" id="kpiViavel">—</div></div>
        <div class="kpi-card orange"><div class="kpi-label">Em análise</div><div class="kpi-value" id="kpiAnalise">—</div></div>
      </div>

      <!-- Vista mapa -->
      <div id="vistaMap" class="map-layout">
        <div class="map-sidebar">
          <div class="filter-card">
            <div style="font-size:13px;font-weight:bold;color:var(--navy);margin-bottom:10px">Filtros</div>
            <label>Tipo</label>
            <select id="fTipo" onchange="aplicarFiltros()">
              <option value="">Todos</option>
              <option>Área para loteamento</option>
              <option>Apartamento</option><option>Casa</option>
              <option>Terreno</option><option>Comercial</option>
              <option>Galpão</option><option>Rural</option>
            </select>
            <label style="margin-top:10px">Status</label>
            <select id="fStatus" onchange="aplicarFiltros()">
              <option value="">Todos</option>
              <option>Recebido</option><option>Em análise</option>
              <option>Em negociação</option><option>Aguardando documentos</option>
              <option>Viável</option><option>Condições inviáveis</option>
              <option>Descartado</option>
            </select>
            <label style="margin-top:10px">Município</label>
            <input type="text" id="fMunicipio" placeholder="Filtrar município…" oninput="aplicarFiltros()">
            <label style="margin-top:10px">Origem</label>
            <select id="fOrigem" onchange="aplicarFiltros()">
              <option value="">Todas</option>
              <option>Parceiro</option><option>MODO</option>
            </select>
          </div>

          <div class="filter-card">
            <div style="font-size:13px;font-weight:bold;color:var(--navy);margin-bottom:10px">Legenda</div>
            <div class="legenda">
              <div class="legenda-item"><div class="dot" style="background:#6b7280"></div>Recebido</div>
              <div class="legenda-item"><div class="dot" style="background:#2563eb"></div>Em análise</div>
              <div class="legenda-item"><div class="dot" style="background:#f97316"></div>Em negociação</div>
              <div class="legenda-item"><div class="dot" style="background:#eab308"></div>Aguardando docs</div>
              <div class="legenda-item"><div class="dot" style="background:#16a34a"></div>Viável</div>
              <div class="legenda-item"><div class="dot" style="background:#dc2626"></div>Inviável</div>
              <div class="legenda-item"><div class="dot" style="background:#475569"></div>Descartado</div>
            </div>
          </div>
        </div>

        <div class="map-container">
          <div id="map"></div>
        </div>
      </div>

      <!-- Vista lista -->
      <div id="vistaLista" style="display:none">
        <div class="card">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Título</th><th>Parceiro</th><th>Tipo</th>
                  <th>Município/UF</th><th>Área</th><th>Valor</th>
                  <th>Status</th><th>Origem</th><th>Data</th>
                </tr>
              </thead>
              <tbody id="tbodyLista">
                <tr><td colspan="9" class="text-center text-muted" style="padding:28px">Carregando…</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js?v=202606300001"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js?v=202606300001"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js?v=202606300001"></script>
<script src="https://unpkg.com/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js?v=202606300001"></script>
<script src="../js/config.js?v=202606300001"></script>
<script src="../js/auth.js?v=202606300001"></script>
<script src="../js/api.js?v=202606300001"></script>
<script src="../js/layout.js?v=202606300001"></script>
<script>
  firebase.initializeApp(CONFIG.firebase);
  document.getElementById('sidebarMount').innerHTML      = renderSidebar(NAV_ADMIN, '/admin/mapa.html');
  document.getElementById('mobileHeaderMount').innerHTML = renderMobileHeader('Mapa');

  const COR_STATUS = {
    'Recebido':              '#6b7280',
    'Em análise':            '#2563eb',
    'Em negociação':         '#f97316',
    'Aguardando documentos': '#eab308',
    'Viável':                '#16a34a',
    'Condições inviáveis':   '#dc2626',
    'Descartado':            '#475569',
  };

  function iconeStatus(status) {
    const cor = COR_STATUS[status] || '#6b7280';
    const svg = encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
      <path d="M14 0C6.3 0 0 6.3 0 14c0 9.8 14 22 14 22S28 23.8 28 14C28 6.3 21.7 0 14 0z" fill="${cor}"/>
      <circle cx="14" cy="14" r="6" fill="white" opacity="0.9"/>
    </svg>`);
    return L.icon({ iconUrl: 'data:image/svg+xml,' + svg, iconSize: [28, 36], iconAnchor: [14, 36], popupAnchor: [0, -36] });
  }

  let map, marcadores = [], todasOps = [];
  let kmlLayers = [];

  requireAuth(true).then(async (profile) => {
    renderUserChip(profile);

    map = L.map('map').setView([-15.8, -47.9], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    try {
      const data = await API.oportunidades.listar({ todos: true });
      todasOps   = data.records || [];
      atualizarKPIs(todasOps);
      plotarMarcadores(todasOps);
      renderLista(todasOps);
    } catch (err) {
      showToast('Erro ao carregar oportunidades: ' + err.message, 'error');
    }
  });

  function atualizarKPIs(ops) {
    document.getElementById('kpiTotal').textContent   = ops.length;
    document.getElementById('kpiViavel').textContent  = ops.filter(o => o.fields['Status'] === 'Viável').length;
    document.getElementById('kpiAnalise').textContent = ops.filter(o => o.fields['Status'] === 'Em análise').length;
    const valores = ops.map(o => o.fields['Valor pretendido (R$)']).filter(Boolean);
    const medio   = valores.length ? valores.reduce((a,b) => a+b, 0) / valores.length : null;
    document.getElementById('kpiMedio').textContent   = medio ? formatMoeda(medio) : '—';
  }

  function plotarMarcadores(ops) {
    marcadores.forEach(m => map.removeLayer(m));
    kmlLayers.forEach(k => map.removeLayer(k));
    marcadores = []; kmlLayers = [];

    ops.forEach(o => {
      const f   = o.fields;
      const lat = f['Latitude'];
      const lng = f['Longitude'];

      // Marcador de pino
      if (lat && lng) {
        const m = L.marker([lat, lng], { icon: iconeStatus(f['Status']) });
        m.bindPopup(`
          <div class="popup-title">${f['Título'] || 'Sem título'}</div>
          <div class="popup-meta">
            📍 ${f['Município'] || '—'}/${f['Estado'] || '—'}<br>
            🏷️ ${f['Tipo de imóvel'] || '—'} · ${f['Tipo de negócio'] || '—'}<br>
            💰 ${formatMoeda(f['Valor pretendido (R$)'])}<br>
            ${f['Área (m²)'] ? `📐 ${f['Área (m²)'].toLocaleString('pt-BR')} m²<br>` : ''}
            ${badgeStatus(f['Status'])}
          </div>
          <a href="oportunidade.html?id=${o.id}" class="popup-btn">Ver detalhes →</a>
        `);
        m.addTo(map);
        marcadores.push(m);
      }

      // Camada KML/KMZ
      if (f['Link KMZ/KML']) {
        try {
          const kml = omnivore.kml(f['Link KMZ/KML']).addTo(map);
          kmlLayers.push(kml);
        } catch { /* link inválido */ }
      }
    });

    // Ajusta zoom para cobrir todos os marcadores
    if (marcadores.length === 1) {
      map.setView(marcadores[0].getLatLng(), 13);
    } else if (marcadores.length > 1) {
      const grupo = L.featureGroup(marcadores);
      map.fitBounds(grupo.getBounds(), { padding: [48, 48] });
    }
  }

  function renderLista(ops) {
    const tbody = document.getElementById('tbodyLista');
    if (!ops.length) {
      tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state"><div class="icon">📭</div><p>Nenhuma oportunidade encontrada.</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = ops.map(o => {
      const f = o.fields;
      return `<tr style="cursor:pointer" onclick="location.href='oportunidade.html?id=${o.id}'">
        <td><strong>${f['Título'] || '—'}</strong></td>
        <td style="font-size:13px">${(f['Nome Completo (from Parceiros)'] || ['—'])[0]}</td>
        <td>${f['Tipo de imóvel'] || '—'}</td>
        <td>${f['Município'] || '—'}/${f['Estado'] || '—'}</td>
        <td>${f['Área (m²)'] ? f['Área (m²)'].toLocaleString('pt-BR') + ' m²' : '—'}</td>
        <td>${formatMoeda(f['Valor pretendido (R$)'])}</td>
        <td>${badgeStatus(f['Status'])}</td>
        <td>${f['Origem'] === 'MODO' ? '<span class="badge badge-modo">MODO</span>' : '<span class="badge badge-parceiro">Parceiro</span>'}</td>
        <td>${formatData(f['Data de entrada'])}</td>
      </tr>`;
    }).join('');
  }

  function aplicarFiltros() {
    const tipo     = document.getElementById('fTipo').value;
    const status   = document.getElementById('fStatus').value;
    const municipio= document.getElementById('fMunicipio').value.toLowerCase();
    const origem   = document.getElementById('fOrigem').value;

    const filtrado = todasOps.filter(o => {
      const f = o.fields;
      return (!tipo      || f['Tipo de imóvel'] === tipo)
          && (!status    || f['Status'] === status)
          && (!municipio || (f['Município'] || '').toLowerCase().includes(municipio))
          && (!origem    || f['Origem'] === origem);
    });

    plotarMarcadores(filtrado);
    renderLista(filtrado);
    atualizarKPIs(filtrado);
  }

  function mostrarMapa() {
    document.getElementById('vistaMap').style.display  = '';
    document.getElementById('vistaLista').style.display = 'none';
    document.getElementById('btnMapa').classList.add('active');
    document.getElementById('btnLista').classList.remove('active');
    setTimeout(() => map && map.invalidateSize(), 100);
  }

  function mostrarLista() {
    document.getElementById('vistaMap').style.display  = 'none';
    document.getElementById('vistaLista').style.display = '';
    document.getElementById('btnMapa').classList.remove('active');
    document.getElementById('btnLista').classList.add('active');
  }
</script>
</body>
</html>
