<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MODOnexo — Detalhe da Oportunidade</title>
  <link rel="stylesheet" href="../css/style.css?v=202606291610">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    #mapDetalhe { height: 280px; border-radius: 10px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; }
    .info-item label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); display: block; margin-bottom: 2px; }
    .info-item span  { font-size: 15px; font-weight: bold; color: var(--navy); }
    .pipeline-steps { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0; }
    .p-step { padding: 7px 14px; border-radius: 20px; font-size: 13px; background: var(--bg); color: var(--text-muted); border: 1.5px solid var(--border); cursor: pointer; transition: all .2s; }
    .p-step:hover { border-color: var(--navy); color: var(--navy); }
    .p-step.atual { background: var(--navy); color: #fff; border-color: var(--navy); }
    .p-step.viavel { background: var(--success); color: #fff; border-color: var(--success); }
    .p-step.inviavel { background: var(--danger); color: #fff; border-color: var(--danger); }
    .p-step.descartado { background: #475569; color: #fff; border-color: #475569; }
    .thumb-g { display: flex; flex-wrap: wrap; gap: 8px; }
    .thumb-g img { width: 90px; height: 90px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); transition: transform .2s; }
    .thumb-g img:hover { transform: scale(1.05); }
    .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.9); z-index: 9999; display: flex; align-items: center; justify-content: center; }
    .lightbox.hidden { display: none; }
    .lightbox img { max-width: 95vw; max-height: 90vh; border-radius: 8px; }
    .lightbox-close { position: absolute; top: 16px; right: 20px; color: #fff; font-size: 32px; cursor: pointer; background: none; border: none; }
    /* Doc viewer */
    .doc-grid { display: flex; flex-wrap: wrap; gap: 12px; }
    .doc-card { width: 110px; cursor: pointer; text-align: center; }
    .doc-card:hover .doc-thumb { transform: scale(1.04); box-shadow: 0 4px 16px rgba(0,0,0,.18); }
    .doc-thumb { width: 110px; height: 140px; border-radius: 8px; border: 1.5px solid var(--border); overflow: hidden; background: #f1f5f9; display: flex; align-items: center; justify-content: center; transition: transform .2s, box-shadow .2s; }
    .doc-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .doc-thumb .doc-icon { font-size: 40px; }
    .doc-name { font-size: 11px; color: var(--text-muted); margin-top: 5px; word-break: break-all; line-height: 1.3; }
    .docviewer { position: fixed; inset: 0; background: rgba(0,0,0,.88); z-index: 10000; display: flex; flex-direction: column; }
    .docviewer.hidden { display: none; }
    .docviewer-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: rgba(0,0,0,.6); }
    .docviewer-bar span { color: #fff; font-size: 14px; font-weight: 600; }
    .docviewer-bar div { display: flex; gap: 10px; }
    .docviewer-body { flex: 1; overflow: hidden; }
    .docviewer-body iframe { width: 100%; height: 100%; border: none; }
    .docviewer-body img  { max-width: 100%; max-height: 100%; margin: auto; display: block; object-fit: contain; height: 100%; }
    .docviewer-body .no-preview { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #fff; gap: 12px; }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebarMount"></div>
  <div class="main-content">
    <div id="mobileHeaderMount"></div>
    <div class="page-header">
      <div>
        <a href="oportunidades.html" style="font-size:13px;color:var(--text-muted)">← Oportunidades</a>
        <h1 class="page-title" id="pageTitulo">Carregando…</h1>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div id="pageStatus"></div>
        <a id="btnEditar" href="#" class="btn btn-outline" style="font-size:13px">✏️ Editar</a>
        <button id="btnDeletar" class="btn" style="font-size:13px;background:var(--danger);color:#fff;border:none">🗑️ Deletar</button>
      </div>
    </div>

    <div class="page-body" id="conteudo" style="display:none">
      <div style="display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start">

        <!-- Coluna principal -->
        <div style="display:flex;flex-direction:column;gap:16px">

          <!-- Dados gerais -->
          <div class="card">
            <div class="card-header"><span class="card-title">Dados do Imóvel</span></div>
            <div class="info-grid" id="infoGrid"></div>
          </div>

          <!-- Localização -->
          <div class="card">
            <div class="card-header"><span class="card-title">📍 Localização</span></div>
            <div id="enderecoInfo" style="font-size:14px;margin-bottom:12px;color:var(--text-muted)"></div>
            <div id="mapDetalhe"></div>
            <div id="kmlInfo" style="margin-top:10px;font-size:13px"></div>
          </div>

          <!-- Imagens -->
          <div class="card" id="cardImagens" style="display:none">
            <div class="card-header"><span class="card-title">🖼️ Imagens</span></div>
            <div class="thumb-g" id="galeriaImagens"></div>
          </div>

          <!-- Documentos -->
          <div class="card" id="cardDocs" style="display:none">
            <div class="card-header"><span class="card-title">📄 Documentos</span></div>
            <div id="listaDocs"></div>
          </div>


          <!-- Vídeo -->
          <div class="card" id="cardVideo" style="display:none">
            <div class="card-header"><span class="card-title">🎬 Vídeo</span></div>
            <div id="videoEmbed"></div>
          </div>

          <!-- Observações -->
          <div class="card" id="cardObs" style="display:none">
            <div class="card-header"><span class="card-title">📝 Observações</span></div>
            <p id="obsTexto" style="font-size:14px;color:var(--text);line-height:1.6"></p>
          </div>

          <!-- Histórico -->
          <div class="card" id="cardHistorico" style="display:none">
            <div class="card-header"><span class="card-title">🕓 Histórico de alterações</span></div>
            <div id="listaHistorico" style="font-size:13px"></div>
          </div>
        </div>

        <!-- Coluna lateral -->
        <div style="display:flex;flex-direction:column;gap:16px">

          <!-- Pipeline -->
          <div class="card">
            <div class="card-header"><span class="card-title">Pipeline</span></div>
            <div class="pipeline-steps" id="pipeline"></div>
            <div id="motivoArea" style="margin-top:10px;display:none">
              <label style="font-size:13px">Motivo (opcional)</label>
              <input type="text" id="motivoInput" placeholder="Descreva o motivo…" style="margin-top:4px">
            </div>
          </div>

          <!-- Parceiro -->
          <div class="card">
            <div class="card-header"><span class="card-title">👤 Parceiro</span></div>
            <div id="parceiroInfo" style="font-size:14px"></div>
          </div>

          <!-- Chat com o parceiro -->
          <div class="card">
            <div class="card-header"><span class="card-title">💬 Mensagens</span></div>
            <div id="chatBox" style="max-height:340px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:10px;padding:4px"></div>
            <div style="display:flex;gap:6px;align-items:flex-end">
              <textarea id="chatInput" rows="2" placeholder="Escreva uma mensagem…" style="flex:1;resize:vertical;font-size:13px"></textarea>
              <button class="btn btn-navy" onclick="enviarMensagem()" style="white-space:nowrap">Enviar</button>
            </div>
          </div>

          <!-- Comissão -->
          <div class="card" id="cardComissao" style="display:none">
            <div class="card-header"><span class="card-title">💰 Comissão</span></div>
            <div id="comissaoInfo" style="font-size:14px"></div>
          </div>

          <!-- Compartilhamentos -->
          <div class="card">
            <div class="card-header"><span class="card-title">🔗 Compartilhar</span></div>
            <p style="font-size:13px;color:var(--text-muted);margin-bottom:10px">Envie esta oportunidade. O acesso é rastreável.</p>
            <button class="btn btn-gold btn-block" style="width:100%" onclick="compartilhar()">📤 Compartilhar</button>
            <button class="btn btn-outline btn-block" style="width:100%;margin-top:6px" onclick="copiarLink()">📋 Copiar link</button>
            <button type="button" onclick="limparCompartilhamentos()" style="width:100%;margin-top:12px;background:none;border:none;font-size:12px;color:var(--text-muted);text-decoration:underline;cursor:pointer">Limpar compartilhamentos (invalida os links já enviados)</button>
            <div id="leadsResumo" style="font-size:13px;color:var(--text-muted);margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">Carregando acessos…</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Lightbox imagens -->
<div class="lightbox hidden" id="lightbox" onclick="fecharLightbox()">
  <button class="lightbox-close" onclick="fecharLightbox()">✕</button>
  <img id="lightboxImg" src="">
</div>

<!-- Doc viewer (Quick Look) -->
<div class="docviewer hidden" id="docviewer">
  <div class="docviewer-bar">
    <span id="dvNome">—</span>
    <div>
      <a id="dvBaixar" href="#" target="_blank" class="btn btn-sm btn-outline" style="color:#fff;border-color:#fff">⬇️ Baixar</a>
      <button onclick="fecharDocViewer()" style="background:none;border:1px solid #fff;color:#fff;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px">✕ Fechar</button>
    </div>
  </div>
  <div class="docviewer-body" id="dvBody"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js?v=202606291610"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js?v=202606291610"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js?v=202606291610"></script>
<script src="https://unpkg.com/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js?v=202606291610"></script>
<script src="../js/config.js?v=202606291610"></script>
<script src="../js/auth.js?v=202606291610"></script>
<script src="../js/api.js?v=202606291610"></script>
<script src="../js/layout.js?v=202606291610"></script>
<script>
  firebase.initializeApp(CONFIG.firebase);
  document.getElementById('sidebarMount').innerHTML      = renderSidebar(NAV_ADMIN, '/admin/oportunidades.html');
  document.getElementById('mobileHeaderMount').innerHTML = renderMobileHeader('Oportunidade');

  const params = new URLSearchParams(location.search);
  const id     = params.get('id');
  if (!id) { location.href = 'oportunidades.html'; }

  let opData = null;

  requireAuth(true).then(async (profile) => {
    renderUserChip(profile);
    try {
      const data = await API.oportunidades.obter(id);
      opData = data;
      const f  = data.fields;

      document.getElementById('pageTitulo').textContent = f['Título'] || 'Sem título';
      document.getElementById('pageStatus').innerHTML   = badgeStatus(f['Status']);
      document.getElementById('btnEditar').href = '../parceiro/nova-oportunidade.html?id=' + id + '&origem=MODO';
      document.getElementById('btnDeletar').onclick = () => deletarOportunidade(id);
      document.getElementById('conteudo').style.display = '';

      // Finalidade: campo multipleSelects (lista completa); fallback no singleSelect
      const finalidadeCompleta = (f['Finalidades']?.length ? f['Finalidades'].join(', ') : f['Tipo de negócio']) || null;

      // Info grid
      document.getElementById('infoGrid').innerHTML = [
        ['Tipo de imóvel',  f['Tipo de imóvel']],
        ['Finalidade',      finalidadeCompleta],
        ['Área',            (f['Área total (m²)'] ?? f['Área (m²)']) != null ? (f['Área total (m²)'] ?? f['Área (m²)']).toLocaleString('pt-BR') + ' m²' : null],
        ['Valor pretendido',formatMoeda(f['Valor pretendido (R$)'])],
        ['Data de entrada', formatData(f['Data de entrada'])],
        ['Origem',          f['Origem'] || 'Parceiro'],
      ].map(([l, v]) => v ? `<div class="info-item"><label>${l}</label><span>${v}</span></div>` : '').join('');

      // Endereço
      const endParts = [f['Endereço'], f['Município'], f['Estado'], f['CEP']].filter(Boolean);
      document.getElementById('enderecoInfo').textContent = endParts.join(', ') || 'Endereço não informado';

      // Mapa
      const mapD = L.map('mapDetalhe').setView([-14.235, -51.925], 4);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' }).addTo(mapD);
      if (f['Latitude'] && f['Longitude']) {
        const ll = [f['Latitude'], f['Longitude']];
        L.marker(ll).addTo(mapD);
        mapD.setView(ll, 13);
      }
      if (f['Link KMZ/KML']) {
        omnivore.kml(f['Link KMZ/KML']).addTo(mapD);
        document.getElementById('kmlInfo').innerHTML = `<a href="${f['Link KMZ/KML']}" target="_blank" class="btn btn-sm btn-outline">⬇️ Baixar KMZ/KML</a>`;
      }

      // Imagens
      if (f['_imagens']?.length) {
        document.getElementById('cardImagens').style.display = '';
        document.getElementById('galeriaImagens').innerHTML  = f['_imagens'].map(url =>
          `<img src="${url}" onclick="abrirLightbox('${url}')" alt="imagem">`
        ).join('');
      }

      // Docs
      if (f['_documentos']?.length) {
        document.getElementById('cardDocs').style.display = '';
        _docsIndex = f['_documentos'];
        document.getElementById('listaDocs').innerHTML = '<div class="doc-grid">' +
          f['_documentos'].map((d, i) => docCard(d, i)).join('') + '</div>';
      }

      // Vídeo
      if (f['Link de vídeo']) {
        document.getElementById('cardVideo').style.display = '';
        const url = f['Link de vídeo'];
        const ytId = url.match(/(?:v=|youtu\.be\/)([^&?]+)/)?.[1];
        document.getElementById('videoEmbed').innerHTML = ytId
          ? `<iframe width="100%" height="240" src="https://www.youtube.com/embed/${ytId}" frameborder="0" allowfullscreen style="border-radius:8px"></iframe>`
          : `<a href="${url}" target="_blank" class="btn btn-outline">▶️ Abrir vídeo</a>`;
      }

      // Observações
      if (f['Observações']) {
        document.getElementById('cardObs').style.display = '';
        document.getElementById('obsTexto').textContent  = f['Observações'];
      }

      // Pipeline
      const PIPELINE = ['Recebido','Em análise','Em negociação','Aguardando documentos','Viável','Condições inviáveis','Descartado'];
      const statusAtual = f['Status'];
      document.getElementById('pipeline').innerHTML = PIPELINE.map(s => {
        let cls = 'p-step';
        if (s === statusAtual) {
          if (s === 'Viável')              cls += ' viavel';
          else if (s === 'Condições inviáveis') cls += ' inviavel';
          else if (s === 'Descartado')     cls += ' descartado';
          else                             cls += ' atual';
        }
        return `<button class="${cls}" onclick="mudarStatus('${s}')">${s}</button>`;
      }).join('');

      // Parceiro
      const nomeParceiro = (f['Nome Completo (from Parceiros)'] || ['—'])[0];
      document.getElementById('parceiroInfo').innerHTML = `
        <strong>${nomeParceiro}</strong><br>
        <span style="color:var(--text-muted)">${f['E-mail do solicitante'] || '—'}</span>`;

      // Comissão
      if (f['Comissão (%)'] || f['Detalhes da comissão']) {
        document.getElementById('cardComissao').style.display = '';
        document.getElementById('comissaoInfo').innerHTML = `
          ${f['Comissão (%)'] ? `<strong>${(f['Comissão (%)']*100).toFixed(1)}%</strong><br>` : ''}
          <span style="color:var(--text-muted)">${f['Detalhes da comissão'] || ''}</span>`;
      }

      // Token / leads
      if (f['Token de compartilhamento']) {
        mostrarLink(f['Token de compartilhamento']);
      }
      carregarLeads(id);
      carregarMensagens();
      renderHistorico(f['Histórico (JSON)']);

    } catch (err) {
      showToast('Erro ao carregar: ' + err.message, 'error');
    }
  });

  async function mudarStatus(novoStatus) {
    const statusNegativos = ['Condições inviáveis','Descartado'];
    if (statusNegativos.includes(novoStatus)) {
      document.getElementById('motivoArea').style.display = '';
    }
    try {
      await API.oportunidades.atualizar(id, { status: novoStatus, motivo: document.getElementById('motivoInput')?.value });
      showToast('Status atualizado: ' + novoStatus, 'success');
      document.getElementById('pageStatus').innerHTML = badgeStatus(novoStatus);
      document.querySelectorAll('.p-step').forEach(b => {
        b.classList.remove('atual','viavel','inviavel','descartado');
        if (b.textContent === novoStatus) {
          if (novoStatus === 'Viável')               b.classList.add('viavel');
          else if (novoStatus === 'Condições inviáveis') b.classList.add('inviavel');
          else if (novoStatus === 'Descartado')      b.classList.add('descartado');
          else                                       b.classList.add('atual');
        }
      });
    } catch (err) { showToast('Erro: ' + err.message, 'error'); }
  }

  let linkCompartilhamento = '';

  function mostrarLink(token) {
    linkCompartilhamento = CONFIG.portalUrl + '/compartilhar/?token=' + token;
  }

  function compartilhar() {
    if (!linkCompartilhamento) { showToast('Link indisponível.', 'error'); return; }
    compartilharOportunidade(opData?.fields || {}, linkCompartilhamento);
  }

  function copiarLink() {
    if (!linkCompartilhamento) { showToast('Link indisponível.', 'error'); return; }
    navigator.clipboard.writeText(linkCompartilhamento);
    showToast('Link copiado!', 'success');
  }

  async function limparCompartilhamentos() {
    if (!confirm('Isso vai invalidar TODOS os links já enviados desta oportunidade. Um novo link será gerado no lugar. Deseja continuar?')) return;
    try {
      const res = await API.oportunidades.gerarToken(id);
      mostrarLink(res.token);
      showToast('Compartilhamentos limpos. Novo link ativo.', 'success');
    } catch (err) { showToast('Erro: ' + err.message, 'error'); }
  }

  async function carregarLeads(opId) {
    try {
      const data  = await apiRequest("GET", "/leads?opId=" + opId);
      const leads = data.records || [];
      const el    = document.getElementById('leadsResumo');
      if (!leads.length) { el.textContent = 'Nenhum acesso registrado ainda.'; return; }
      el.innerHTML = `<strong>${leads.length} acesso(s) registrado(s)</strong><div style="margin-top:8px;display:flex;flex-direction:column;gap:6px">` +
        leads.map(l => `
          <div style="font-size:12px;padding:6px;background:var(--bg);border-radius:6px">
            <strong>${l.fields['Nome'] || '—'}</strong><br>
            📱 ${l.fields['WhatsApp'] || '—'}<br>
            🕐 ${l.fields['Data e hora do acesso'] ? new Date(l.fields['Data e hora do acesso']).toLocaleString('pt-BR') : '—'}
          </div>`).join('') + '</div>';
    } catch { /* silencioso */ }
  }

  function renderHistorico(json) {
    if (!json) return;
    let log = [];
    try { log = JSON.parse(json); } catch { return; }
    if (!log.length) return;
    const card = document.getElementById('cardHistorico');
    const lista = document.getElementById('listaHistorico');
    card.style.display = '';
    const truncar = (s, n=50) => {
      if (!s) return '—';
      if (s.startsWith('http') && s.includes('/')) {
        const nome = decodeURIComponent(s.split('/').pop().split('?')[0]);
        return nome.length > n ? nome.slice(0, n) + '…' : nome;
      }
      return s.length > n ? s.slice(0, n) + '…' : s;
    };
    lista.innerHTML = [...log].reverse().map(e => {
      const dt   = new Date(e.data).toLocaleString('pt-BR');
      const quem = e.admin
        ? `<span style="color:var(--navy);font-weight:600">Admin — ${e.nome || e.email}</span>`
        : `<span style="font-weight:600">Parceiro — ${e.nome || e.email}</span>`;
      const itens = (e.alteracoes || []).map(a =>
        `<div style="margin-top:4px;padding:4px 8px;background:var(--bg);border-radius:6px;font-size:12px">
          <span style="color:var(--text-muted)">${a.campo}</span><br>
          <span style="color:var(--danger);text-decoration:line-through">${truncar(a.de)}</span>
          <span style="margin:0 4px;color:var(--text-muted)">→</span>
          <span style="color:var(--success)">${truncar(a.para)}</span>
        </div>`
      ).join('');
      return `<div style="border-left:3px solid var(--gold);padding:6px 10px;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:4px">
          ${quem}
          <span style="font-size:11px;color:var(--text-muted)">${dt}</span>
        </div>${itens}
      </div>`;
    }).join('');
  }

  function abrirLightbox(url) {
    document.getElementById('lightboxImg').src = url;
    document.getElementById('lightbox').classList.remove('hidden');
  }
  function fecharLightbox() { document.getElementById('lightbox').classList.add('hidden'); }

  function extDoc(nome) { return (nome.split('.').pop() || '').toLowerCase(); }

  function docThumbHtml(d) {
    const ext = extDoc(d.nome);
    const imgs = ['jpg','jpeg','png','gif','webp','svg'];
    if (imgs.includes(ext)) {
      return `<img src="${d.url}" alt="${d.nome}" onerror="this.parentElement.innerHTML='<span class=doc-icon>🖼️</span>'">`;
    }
    if (ext === 'pdf') {
      const thumbSrc = d.url.replace('/image/upload/', '/image/upload/pg_1,w_220,c_limit/').replace(/\.pdf$/i, '.jpg');
      return `<img src="${thumbSrc}" alt="${d.nome}" onerror="this.parentElement.innerHTML='<span class=doc-icon>📄</span>'">`;
    }
    const icons = { doc:'📝', docx:'📝', xls:'📊', xlsx:'📊', ppt:'📋', pptx:'📋', zip:'🗜️', kmz:'🗺️', kml:'🗺️' };
    return `<span class="doc-icon">${icons[ext] || '📎'}</span>`;
  }

  let _docsIndex = [];

  function docCard(d, idx) {
    return `<div class="doc-card" onclick="_docsIndex[${idx}]&&abrirDocViewer(_docsIndex[${idx}])">
      <div class="doc-thumb">${docThumbHtml(d)}</div>
      <div class="doc-name">${d.nome}</div>
    </div>`;
  }

  function abrirDocViewer(d) {
    const ext  = extDoc(d.nome);
    const imgs = ['jpg','jpeg','png','gif','webp','svg'];
    document.getElementById('dvNome').textContent = d.nome;
    document.getElementById('dvBaixar').href      = d.url;
    let html;
    if (imgs.includes(ext)) {
      html = `<img src="${d.url}" alt="${d.nome}" style="max-width:100%;max-height:100%;margin:auto;display:block;object-fit:contain;height:100%">`;
    } else if (ext === 'pdf') {
      window.open(d.url, '_blank');
      return;
    } else {
      html = `<div class="no-preview"><span style="font-size:64px">📎</span><p style="font-size:16px">${d.nome}</p><p style="font-size:13px;opacity:.7">Visualização não disponível para este formato</p><a href="${d.url}" target="_blank" class="btn btn-gold" style="margin-top:8px">⬇️ Baixar arquivo</a></div>`;
    }
    document.getElementById('dvBody').innerHTML = html;
    document.getElementById('docviewer').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }

  function fecharDocViewer() {
    document.getElementById('docviewer').classList.add('hidden');
    document.getElementById('dvBody').innerHTML = '';
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { fecharLightbox(); fecharDocViewer(); }
  });

  async function carregarMensagens() {
    const box = document.getElementById('chatBox');
    try {
      const data = await API.mensagens.listar(id);
      renderChat(box, data.records || [], 'Admin');
    } catch (err) { box.innerHTML = '<p style="color:var(--danger);font-size:13px">Erro ao carregar mensagens: ' + escapeHtml(err.message) + '</p>'; }
  }

  async function enviarMensagem() {
    const input = document.getElementById('chatInput');
    const texto = input.value.trim();
    if (!texto) return;
    input.disabled = true;
    try {
      await API.mensagens.enviar(id, texto);
      input.value = '';
      await carregarMensagens();
    } catch (err) { showToast('Erro ao enviar: ' + err.message, 'error'); }
    finally { input.disabled = false; input.focus(); }
  }

  async function deletarOportunidade(opId) {
    if (!confirm('Tem certeza que deseja deletar esta oportunidade? Esta ação não pode ser desfeita.')) return;
    try {
      showLoading(true);
      await apiRequest("DELETE", "/oportunidades/" + opId);
      showToast('Oportunidade deletada', 'success');
      setTimeout(() => window.location.href = 'oportunidades.html', 500);
    } catch (err) {
      showToast('Erro: ' + err.message, 'error');
      showLoading(false);
    }
  }
</script>
