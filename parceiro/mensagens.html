<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MODOnexo — Mensagens</title>
  <link rel="stylesheet" href="../css/style.css?v=202606300001">
</head>
<body>
<div class="app-layout">
  <div id="sidebarMount"></div>
  <div class="main-content">
    <div id="mobileHeaderMount"></div>
    <div class="page-header">
      <h1 class="page-title">💬 Mensagens</h1>
    </div>
    <div class="page-body">
      <div class="card">
        <div id="listaConversas">
          <p class="text-muted" style="padding:20px;text-align:center">Carregando…</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js?v=202606300001"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js?v=202606300001"></script>
<script src="../js/config.js?v=202606300001"></script>
<script src="../js/auth.js?v=202606300001"></script>
<script src="../js/api.js?v=202606300001"></script>
<script src="../js/layout.js?v=202606300001"></script>
<script>
  firebase.initializeApp(CONFIG.firebase);
  document.getElementById('sidebarMount').innerHTML      = renderSidebar(NAV_PARCEIRO, '/parceiro/mensagens.html');
  document.getElementById('mobileHeaderMount').innerHTML = renderMobileHeader('Mensagens');

  requireAuth(false).then(async (profile) => {
    renderUserChip(profile);
    try {
      const [opsData, naoLidas] = await Promise.all([
        API.oportunidades.listar(),
        API.mensagens.naoLidas(),
      ]);

      atualizarBadgeChat(naoLidas.count);

      const ops = (opsData.records || []).filter(o => o.fields['Mensagens']?.length > 0);
      const lista = document.getElementById('listaConversas');

      if (!ops.length) {
        lista.innerHTML = '<div class="empty-state" style="padding:40px"><div class="icon">💬</div><p>Nenhuma conversa ainda.<br>As mensagens aparecem aqui quando a equipe MODOnexo entrar em contato.</p></div>';
        return;
      }

      lista.innerHTML = ops.map(o => {
        const naoLidasOp = naoLidas.porOportunidade?.[o.id] || 0;
        const total = o.fields['Mensagens'].length;
        return `
          <a href="oportunidade.html?id=${o.id}" style="display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);text-decoration:none;color:inherit">
            <div style="width:40px;height:40px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">💬</div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:600;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${o.fields['Título'] || '—'}</div>
              <div style="font-size:12px;color:var(--text-muted)">${o.fields['Município'] || ''} · ${total} mensagem${total !== 1 ? 's' : ''}</div>
            </div>
            ${naoLidasOp > 0
              ? `<span style="background:#ef4444;color:#fff;font-size:12px;font-weight:700;border-radius:12px;padding:3px 9px;flex-shrink:0">${naoLidasOp} nova${naoLidasOp > 1 ? 's' : ''}</span>`
              : `<span style="font-size:18px;color:var(--text-muted)">›</span>`}
          </a>`;
      }).join('');

    } catch (err) {
      showToast('Erro ao carregar: ' + err.message, 'error');
    }
  });
</script>
</body>
</html>
