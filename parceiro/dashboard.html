<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MODOnexo — Dashboard</title>
  <link rel="stylesheet" href="../css/style.css?v=202607021500">
</head>
<body>
<div class="app-layout">

  <div id="sidebarMount"></div>

  <div class="main-content">
    <div id="mobileHeaderMount"></div>

    <div class="page-header">
      <h1 class="page-title">Dashboard</h1>
      <a href="nova-oportunidade.html" class="btn btn-gold">➕ Nova Oportunidade</a>
    </div>

    <div class="page-body">
      <div class="kpi-grid" id="kpiGrid">
        <div class="kpi-card"><div class="kpi-label">Total enviadas</div><div class="kpi-value" id="kpiTotal">—</div></div>
        <div class="kpi-card gold"><div class="kpi-label">Em análise</div><div class="kpi-value" id="kpiAnalise">—</div></div>
        <div class="kpi-card green"><div class="kpi-label">Viáveis</div><div class="kpi-value" id="kpiViavel">—</div></div>
        <div class="kpi-card orange"><div class="kpi-label">Em negociação</div><div class="kpi-value" id="kpiNeg">—</div></div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Últimas Oportunidades</span>
          <a href="oportunidades.html" style="font-size:13px;color:var(--navy)">Ver todas →</a>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Título</th>
                <th>Tipo</th>
                <th>Município</th>
                <th>Valor</th>
                <th>Status</th>
                <th>Data</th>
              </tr>
            </thead>
            <tbody id="tbodyOps">
              <tr><td colspan="6" class="text-center text-muted" style="padding:28px">Carregando…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="card mt-16">
        <div class="card-header">
          <span class="card-title">📢 Últimos Avisos</span>
          <a href="avisos.html" style="font-size:13px;color:var(--navy)">Ver todos →</a>
        </div>
        <div id="avisosArea">
          <p class="text-muted" style="font-size:14px;padding:8px 0">Carregando…</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="loading-overlay hidden" id="loadingOverlay">
  <div class="spinner"></div>
  <span style="color:var(--navy);font-size:14px">Carregando…</span>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js?v=202607021500"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js?v=202607021500"></script>
<script src="../js/config.js?v=202607021500"></script>
<script src="../js/auth.js?v=202607021500"></script>
<script src="../js/api.js?v=202607021500"></script>
<script src="../js/layout.js?v=202607021500"></script>
<script>
  firebase.initializeApp(CONFIG.firebase);

  document.getElementById('sidebarMount').innerHTML     = renderSidebar(NAV_PARCEIRO, '/parceiro/dashboard.html');
  document.getElementById('mobileHeaderMount').innerHTML = renderMobileHeader('Dashboard');

  requireAuth().then(async (profile) => {
    renderUserChip(profile);
    showLoading(true);

    try {
      const data = await API.oportunidades.listar({ limit: 5 });
      const ops  = data.records || [];

      // KPIs
      document.getElementById('kpiTotal').textContent   = ops.length;
      document.getElementById('kpiAnalise').textContent = ops.filter(o => o.fields['Status'] === 'Em análise').length;
      document.getElementById('kpiViavel').textContent  = ops.filter(o => o.fields['Status'] === 'Viável').length;
      document.getElementById('kpiNeg').textContent     = ops.filter(o => o.fields['Status'] === 'Em negociação').length;

      // Tabela
      const tbody = document.getElementById('tbodyOps');
      if (!ops.length) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="icon">📭</div><p>Nenhuma oportunidade cadastrada ainda.</p><a href="nova-oportunidade.html" class="btn btn-gold">Cadastrar agora</a></div></td></tr>`;
      } else {
        tbody.innerHTML = ops.map(o => `
          <tr style="cursor:pointer" onclick="location.href='oportunidade.html?id=${o.id}'">
            <td><strong>${escapeHtml(o.fields['Título'] || '—')}</strong></td>
            <td>${escapeHtml(o.fields['Tipo de imóvel'] || '—')}</td>
            <td>${escapeHtml(o.fields['Município'] || '—')}</td>
            <td>${formatMoeda(o.fields['Valor pretendido (R$)'])}</td>
            <td>${badgeStatus(o.fields['Status'])}</td>
            <td>${formatData(o.fields['Data de entrada'])}</td>
          </tr>`).join('');
      }

      // Avisos
      const avData = await API.avisos.listar();
      const avisos = (avData.records || []).slice(0, 3);
      const avArea = document.getElementById('avisosArea');
      if (!avisos.length) {
        avArea.innerHTML = `<p class="text-muted" style="font-size:14px">Nenhum aviso no momento.</p>`;
      } else {
        avArea.innerHTML = avisos.map(a => `
          <div style="padding:10px 0;border-bottom:1px solid var(--border)">
            <div style="font-size:14px">${escapeHtml(a.fields['Mensagem'] || '')}</div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:4px">${formatData(a.fields['Data e hora']?.split('T')[0])}</div>
          </div>`).join('');
      }
    } catch (err) {
      showToast('Erro ao carregar dados: ' + err.message, 'error');
    } finally {
      showLoading(false);
    }
  });
</script>
</body>
</html>
