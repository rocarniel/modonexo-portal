<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MODOnexo — Minhas Oportunidades</title>
  <link rel="stylesheet" href="../css/style.css?v=202607020001">
</head>
<body>
<div class="app-layout">
  <div id="sidebarMount"></div>
  <div class="main-content">
    <div id="mobileHeaderMount"></div>
    <div class="page-header">
      <h1 class="page-title">Minhas Oportunidades</h1>
      <a href="nova-oportunidade.html" class="btn btn-gold">➕ Nova</a>
    </div>
    <div class="page-body">
      <div class="filters-bar">
        <select id="filtroStatus" onchange="filtrar()">
          <option value="">Todos os status</option>
          <option>Recebido</option>
          <option>Em análise</option>
          <option>Em negociação</option>
          <option>Aguardando documentos</option>
          <option>Viável</option>
          <option>Condições inviáveis</option>
          <option>Descartado</option>
        </select>
        <select id="filtroTipo" onchange="filtrar()">
          <option value="">Todos os tipos</option>
          <option>Área para loteamento</option>
          <option>Apartamento</option>
          <option>Casa residencial</option>
          <option>Terreno/Lote urbano</option>
          <option>Sala comercial</option>
          <option>Galpão</option>
          <option>Gleba rural</option>
        </select>
        <input type="text" id="filtroTexto" placeholder="🔍 Buscar…" oninput="filtrar()" style="min-width:180px">
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Título / Tipo</th>
                <th>Município</th>
                <th>Área</th>
                <th>Valor</th>
                <th>Status</th>
                <th>Data</th>
                <th>Compartilhar</th>
              </tr>
            </thead>
            <tbody id="tbody">
              <tr><td colspan="7" class="text-center text-muted" style="padding:28px">Carregando…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>


<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js?v=202607020001"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js?v=202607020001"></script>
<script src="../js/config.js?v=202607020001"></script>
<script src="../js/auth.js?v=202607020001"></script>
<script src="../js/api.js?v=202607020001"></script>
<script src="../js/layout.js?v=202607020001"></script>
<script>
  firebase.initializeApp(CONFIG.firebase);
  document.getElementById('sidebarMount').innerHTML      = renderSidebar(NAV_PARCEIRO, '/parceiro/oportunidades.html');
  document.getElementById('mobileHeaderMount').innerHTML = renderMobileHeader('Oportunidades');

  let todasOps = [];
  let perfilNome = '';

  requireAuth().then(async (profile) => {
    renderUserChip(profile);
    perfilNome = profile.nome || '';
    try {
      const data = await API.oportunidades.listar();
      todasOps = data.records || [];
      renderTabela(todasOps);
    } catch (err) {
      showToast('Erro ao carregar: ' + err.message, 'error');
    }
  });

  function renderTabela(ops) {
    const tbody = document.getElementById('tbody');
    if (!ops.length) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="icon">📭</div><p>Nenhuma oportunidade encontrada.</p><a href="nova-oportunidade.html" class="btn btn-gold">Cadastrar agora</a></div></td></tr>`;
      return;
    }
    tbody.innerHTML = ops.map(o => `
      <tr style="cursor:pointer" onclick="if(event.target.closest('button,a'))return;location.href='oportunidade.html?id=${o.id}'">
        <td>
          <strong>${escapeHtml(o.fields['Título'] || '—')}</strong><br>
          <span style="font-size:12px;color:var(--text-muted)">${escapeHtml(o.fields['Tipo de imóvel'] || '')}</span>
        </td>
        <td>${escapeHtml(o.fields['Município'] || '—')}<br><span style="font-size:12px;color:var(--text-muted)">${escapeHtml(o.fields['Estado'] || '')}</span></td>
        <td>${(o.fields['Área total (m²)'] ?? o.fields['Área (m²)']) != null ? (o.fields['Área total (m²)'] ?? o.fields['Área (m²)']).toLocaleString('pt-BR') + ' m²' : '—'}</td>
        <td>${formatMoeda(o.fields['Valor pretendido (R$)'])}</td>
        <td>${badgeStatus(o.fields['Status'])}</td>
        <td>${formatData(o.fields['Data de entrada'])}</td>
        <td style="white-space:nowrap">
          <button class="btn btn-sm btn-gold" title="Compartilhar" onclick="compartilharDaLista('${o.id}')">📤</button>
          <button class="btn btn-sm btn-outline" title="Enviar a um cliente" onclick="enviarClienteDaLista('${o.id}')" style="margin-left:4px">👤</button>
        </td>
      </tr>`).join('');
  }

  function filtrar() {
    const status = document.getElementById('filtroStatus').value;
    const tipo   = document.getElementById('filtroTipo').value;
    const texto  = document.getElementById('filtroTexto').value.toLowerCase();
    const filtrado = todasOps.filter(o => {
      const f = o.fields;
      return (!status || f['Status'] === status)
          && (!tipo   || f['Tipo de imóvel'] === tipo)
          && (!texto  || (f['Título'] || '').toLowerCase().includes(texto)
                      || (f['Município'] || '').toLowerCase().includes(texto));
    });
    renderTabela(filtrado);
  }

  async function resolverLink(id) {
    const op = todasOps.find(o => o.id === id);
    let token = op?.fields['Token de compartilhamento'];
    if (!token) {
      const res = await API.oportunidades.gerarToken(id);
      token = res.token;
      op.fields['Token de compartilhamento'] = token;
    }
    return { fields: op.fields, link: CONFIG.portalUrl + '/compartilhar/?token=' + token };
  }

  async function compartilharDaLista(id) {
    try {
      const { fields, link } = await resolverLink(id);
      await compartilharOportunidade(fields, link, perfilNome);
    } catch (err) { showToast('Erro ao gerar link: ' + err.message, 'error'); }
  }

  async function enviarClienteDaLista(id) {
    try {
      const { fields, link } = await resolverLink(id);
      abrirEnvioCliente(fields, link, perfilNome);
    } catch (err) { showToast('Erro ao gerar link: ' + err.message, 'error'); }
  }
</script>
</body>
</html>
